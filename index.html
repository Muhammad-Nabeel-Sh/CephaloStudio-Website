<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon_new.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cephalometry Studio — a free, browser-based tool for cephalometric analysis. Place landmarks, take measurements, run reliability statistics, and generate reports. No backend required." />
    <meta property="og:title" content="Cephalometry Studio" />
    <meta property="og:description" content="Browser-based cephalometric analysis — landmarking, measurements, statistics, and reporting." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cephalometry.studio" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="canonical" href="https://cephalometry.studio" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon_apple.png" />
    <title>Cephalometry Studio</title>
    <style>
      body { margin: 0; background: #1a1a2e; }
      #splash { display:flex; align-items:center; justify-content:center; height:100vh; background:#1a1a2e; flex-direction:column; gap:16px; }
      #splash-logo { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #7c5cfc; }
      #splash-sub { font-family: 'DM Sans', sans-serif; font-size: 13px; color: #888; }
      @keyframes splashPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
      #splash-dot { animation: splashPulse 1.2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <span id="splash-logo">Cephalometry Studio</span>
        <span id="splash-sub"><span id="splash-dot">●</span> loading</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
