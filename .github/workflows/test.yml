name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # required for CodeQL to upload SARIF results

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      # Lint is now blocking (was `continue-on-error: true`, so style/quality
      # regressions merged silently).
      - run: npm run lint

      - run: npm test

      - run: npm run build

  # Dependency vulnerability audit. Fails the build on high or critical
  # advisories (`--audit-level=high`). Moderate/low are reported but do not
  # block, so transitive noise doesn't stall every PR.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  # GitHub CodeQL semantic security analysis — detects injection/path-traversal
  # patterns in the JS/React source and uploads SARIF to the repo Security tab.
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # fail on high-confidence security queries
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # Dependency Review on pull requests — compares the dependency diff against
  # the GitHub Advisory Database and rejects PRs that introduce known
  # vulnerabilities. Runs only on PRs (needs the pull_request compare context).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Block PRs that add a high/critical vulnerability; warn on moderate.
          fail-on-severity: high
